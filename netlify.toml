[build]
command = "npx @11ty/eleventy"
functions = "netlify/functions"
publish = "/_site"

[[headers]]
for = "/*.ico"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.jpg"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.jpeg"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.png"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.svg"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.webm"

[headers.values]
Cache-Control = "public, max-age=604800"
